<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Інформація про хімічні речовини</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #374151;
            padding: 1rem;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background-color: #fff;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .info-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .info-panel {
            background-color: #e5e7eb;
            border-radius: 1rem;
            padding: 1rem;
            text-align: left;
            width: 100%;
        }
        .info-panel ul {
            list-style-type: disc;
            padding-left: 1.5rem;
        }
        .info-panel li {
            margin-bottom: 0.5rem;
        }
        .list-item {
            background-color: #e5e7eb;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            display: block;
            text-decoration: none;
            color: #1f2937;
            font-weight: 600;
        }
        .list-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .image-wrapper {
            width: 200px; 
            height: 200px; 
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
        }
        .image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        @media (min-width: 640px) {
            .container.detail-view {
                flex-direction: row;
                align-items: flex-start;
                justify-content: space-between;
                gap: 2rem;
            }
            .info-container {
                align-items: flex-start;
            }
            .content-section {
                flex-direction: row;
                justify-content: flex-start;
                gap: 2rem;
            }
            .image-and-buttons {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 1rem;
            }
            .buttons-container {
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
            }
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="appContainer" class="container">
        
        <div id="mainView" class="w-full">
            <h1 class="text-3xl font-bold mb-6 text-center sm:text-left">Список хімічних речовин для дільниці пакування (PKG)</h1>
            
            <div class="mb-6 w-full">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Пошук речовини за назвою..." 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 text-gray-900 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                >
            </div>

            <div id="substanceList" class="space-y-4">
                </div>
        </div>

        <div id="detailView" class="hidden w-full relative">
            <button onclick="showMainView()" class="absolute top-0 left-0 text-black text-2xl font-bold transition-all duration-300 transform hover:scale-105 z-10">
                &larr;
            </button>
            <div id="detailContent" class="w-full flex flex-col sm:flex-row gap-8 pt-10 sm:pt-0">
                </div>
        </div>
    </div>

    <script>
        // Об'єкт з даними про хімічні речовини
        const substanceData = {
            'Спирт ізопропиловий': {
                image: 'https://raw.githubusercontent.com/shylovak-spec/ziz/refs/heads/main/images/shopping.webp',
                dangers: `
                    <h3 class="font-bold text-lg mb-2">Небезпеки</h3>
                    <ul class="list-disc pl-5 text-gray-700">
                        <li>Викликає серйозне подразнення очей (H319)</li>
                        <li>Може викликати сонливість або запаморочення (H336)</li>
                        <li>Легкозаймиста рідина та випари (H225)</li>
                    </ul>
                `,
                actions: `
                    <h3 class="font-bold text-lg mb-2">Дії при аварії</h3>
                    <ul class="list-disc pl-5 text-gray-700">
                        <li><b>Потрапляння в очі:</b> Промити великою кількістю води протягом 10 хв</li>
                        <li><b>Отруєння при вдиханні:</b> Вивести на свіже повітря, послабити тісний одяг (комір, краватка, ремінь або пояс)</li>
                    </ul>
                `,
                protection: `
                    <h3 class="font-bold text-lg mb-2">Засоби захисту</h3>
                    <ul class="list-disc pl-5 text-gray-700">
                        <li>Захисні рукавички гумові</li>
                        <li>Захисні окуляри закритого типу</li>
                    </ul>
                `,
                industrialApplication: `
                    <h3 class="font-bold text-lg mb-2">Застосування на виробництві</h3>
                    <ul class="list-disc pl-5 text-gray-700">
                        <li>Очищення електронних компонентів</li>
                        <li>Як розчинник жирів</li>
                        <li>Обслуговування зони принеру та печі</li>
                    </ul>
                `
            },
            'Миючий засіб "Blitz"': {
                image: 'https://raw.githubusercontent.com/shylovak-spec/ziz/refs/heads/main/images/blitz.webp',
                dangers: `
                    <h3 class="font-bold text-lg mb-2">Небезпеки</h3>
                    <ul class="list-disc pl-5 text-gray-700">
                        <li>Викликає подразнення шкіри (H315)</li>
                        <li>Викликає серйозне пошкодження очей (H318)</li>
                    </ul>
                `,
                actions: `
                    <h3 class="font-bold text-lg mb-2">Дії при аварії</h3>
                    <ul class="list-disc pl-5 text-gray-700">
                        <li><b>Потрапляння в очі:</b> Промити великою кількістю води протягом 15 хв</li>
                        <li><b>Отруєння при вдиханні:</b> Вивести на свіже повітря, послабити тісний одяг (комір, краватка, ремінь або пояс)</li>
                        <li><b>Потрапляння на шкіру:</b> Змити великою кількістю води, зняти забруднений одяг. У разі несприятливих наслідків для здоров'я звернутися до лікаря. При забрудненні одягу, випрати перед повторним використанням.</li>
                    </ul>
                `,
                protection: `
                    <h3 class="font-bold text-lg mb-2">Засоби захисту</h3>
                    <ul class="list-disc pl-5 text-gray-700">
                        <li>Захисні рукавички гумові</li>
                        <li>Захисні окуляри закритого типу або повнолицьова маска</li>
                    </ul>
                `,
                industrialApplication: `
                    <h3 class="font-bold text-lg mb-2">Застосування на виробництві</h3>
                    <ul class="list-disc pl-5 text-gray-700">
                        <li>Чищення обладнання та промислових приміщень</li>
                        <li>Прибирання робочого місця</li>
                    </ul>
                `
            },
        };

        // Функція для генерації списку речовин з можливістю фільтрації
        function renderList(filterQuery = '') {
            const substanceList = document.getElementById('substanceList');
            substanceList.innerHTML = ''; // Очищаємо список перед перемальовуванням

            const lowerCaseQuery = filterQuery.toLowerCase();

            for (const substance in substanceData) {
                // Перевіряємо, чи збігається назва речовини з пошуковим запитом
                if (substance.toLowerCase().includes(lowerCaseQuery)) {
                    const listItem = document.createElement('a');
                    listItem.href = '#';
                    listItem.classList.add('list-item');
                    listItem.textContent = substance;
                    listItem.onclick = (e) => {
                        e.preventDefault();
                        showDetailView(substance);
                    };
                    substanceList.appendChild(listItem);
                }
            }

            // Якщо нічого не знайдено, виводимо підказку
            if (substanceList.children.length === 0) {
                substanceList.innerHTML = '<p class="text-center text-gray-500 py-4">Речовин за вашим запитом не знайдено</p>';
            }
        }

        // Функція для відображення головної сторінки зі списком
        function showMainView() {
            document.getElementById('mainView').classList.remove('hidden');
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('appContainer').classList.remove('detail-view');
        }

        // Функція для відображення детальної інформації про речовину
        function showDetailView(substanceName) {
            const data = substanceData[substanceName];
            if (!data) return;

            const detailContent = document.getElementById('detailContent');
            detailContent.innerHTML = `
                <div class="image-and-buttons flex flex-col items-center w-full sm:w-1/2">
                    <h2 class="text-xl sm:text-2xl font-semibold mb-4 text-center">${substanceName}</h2>
                    <div class="image-wrapper mb-4">
                        <img src="${data.image}" alt="Зображення ${substanceName}" class="rounded-lg">
                    </div>
                    <div class="buttons-container w-full sm:w-auto">
                        <button onclick='showSubstanceInfo(${JSON.stringify(substanceName)}, "dangers")' class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all duration-300 transform hover:scale-105 mb-2">Небезпеки</button>
                        <button onclick='showSubstanceInfo(${JSON.stringify(substanceName)}, "actions")' class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all duration-300 transform hover:scale-105 mb-2">Дії при аварії</button>
                        <button onclick='showSubstanceInfo(${JSON.stringify(substanceName)}, "protection")' class="w-full bg-lime-600 hover:bg-lime-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all duration-300 transform hover:scale-105 mb-2">Засоби захисту</button>
                        <button onclick='showSubstanceInfo(${JSON.stringify(substanceName)}, "industrialApplication")' class="w-full bg-neutral-400 hover:bg-neutral-500 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all duration-300 transform hover:scale-105">Застосування на виробництві</button>
                    </div>
                </div>

                <div id="substanceInfoDisplay" class="info-panel mt-4 sm:mt-0 w-full sm:w-1/2">
                    <p class="text-gray-600">Натисніть на одну з кнопок, щоб побачити інформацію.</p>
                </div>
            `;
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            document.getElementById('appContainer').classList.add('detail-view');
        }

        function showSubstanceInfo(substanceName, infoType) {
            const displayPanel = document.getElementById('substanceInfoDisplay');
            const content = substanceData[substanceName][infoType];
            displayPanel.innerHTML = content;
        }

        // Ініціалізація та прив'язка події пошуку
        function initializeApp() {
            renderList();

            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                renderList(e.target.value);
            });
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
